<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему УФСБ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0a1f14 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            margin-top: 100px;
        }
        .card {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #c4a747;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .card-header {
            background: linear-gradient(135deg, #2d5a3b 0%, #1a3a25 100%);
            color: #ffd700;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #c4a747;
        }
        .form-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid #c4a747;
            color: white;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.2);
            border-color: #ffd700;
            color: white;
            box-shadow: none;
        }
        .form-label {
            color: #ffd700;
        }
        .btn-login {
            background: linear-gradient(135deg, #2d5a3b 0%, #1a3a25 100%);
            color: #ffd700;
            border: 1px solid #c4a747;
            width: 100%;
            padding: 10px;
            font-weight: bold;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #3a7a4f 0%, #2a5a35 100%);
            color: #ffe44d;
        }
        .errors {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 80px;
            color: #ffd700;
        }
        h1 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container login-container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="logo">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1>УФСБ России</h1>
                <div class="card">
                    <div class="card-header">
                        Вход в систему
                    </div>
                    <div class="card-body">
                        <form action="/login" method="POST">
                            <div class="mb-3">
                                <label for="login" class="form-label">Логин</label>
                                <input type="text" class="form-control" id="login" name="login" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-login">
                                <i class="fas fa-sign-in-alt"></i> Войти
                            </button>
                        </form>
                        <div class="errors">
                            {% for error in errors %}
                            <p>{{ error }}</p>
                            {% endfor %}
                        </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</body>
</html>
