<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация сотрудников УФСБ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0a1f14 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .register-container {
            margin-top: 50px;
            margin-bottom: 50px;
        }
        .card {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #c4a747;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .card-header {
            background: linear-gradient(135deg, #2d5a3b 0%, #1a3a25 100%);
            color: #ffd700;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #c4a747;
        }
        .form-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid #c4a747;
            color: white;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.2);
            border-color: #ffd700;
            color: white;
            box-shadow: none;
        }
        .form-label {
            color: #ffd700;
        }
        .btn-register {
            background: linear-gradient(135deg, #2d5a3b 0%, #1a3a25 100%);
            color: #ffd700;
            border: 1px solid #c4a747;
            width: 100%;
            padding: 10px;
            font-weight: bold;
        }
        .errors {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
        }
        select option {
            background: #1a3a25;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container register-container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        Регистрация сотрудника УФСБ
                    </div>
                    <div class="card-body">
                        <form action="/register" method="POST">
                            <div class="mb-3">
                                <label for="surname" class="form-label">Фамилия</label>
                                <input type="text" class="form-control" id="surname" name="surname" required>
                            </div>
                            <div class="mb-3">
                                <label for="name" class="form-label">Имя</label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                            <div class="mb-3">
                                <label for="patronymic" class="form-label">Отчество</label>
                                <input type="text" class="form-control" id="patronymic" name="patronymic" required>
                            </div>
                            <div class="mb-3">
                                <label for="login" class="form-label">Логин</label>
                                <input type="text" class="form-control" id="login" name="login" required>
                            </div>
                            <div class="mb-3">
                                <label for="pass1" class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="pass1" name="pass1" required>
                            </div>
                            <div class="mb-3">
                                <label for="pass2" class="form-label">Подтверждение пароля</label>
                                <input type="password" class="form-control" id="pass2" name="pass2" required>
                            </div>
                            <div class="mb-3">
                                <label for="rank_level" class="form-label">Звание</label>
                                <select class="form-control" id="rank_level" name="rank_level" required>
                                    {% for level, rank in ranks.items() %}
                                    <option value="{{ level }}">{{ rank }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <button type="submit" class="btn btn-register">
                                Зарегистрировать
                            </button>
                        </form>
                        <div class="errors">
                            {% for error in errors %}
                            <p>{{ error }}</p>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
