<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация сотрудников УФСБ | by Andrey and Timur</title>
    <link rel="stylesheet" href="{{ url_for('static', filename = 'css/style.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0a1f14 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            padding-top: 50px;
        }
        .card {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #c4a747;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .card-header {
            background: linear-gradient(135deg, #2d5a3b 0%, #1a3a25 100%);
            color: #ffd700;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #c4a747;
            border-radius: 15px 15px 0 0 !important;
        }
        .btn-fsb {
            background: linear-gradient(135deg, #2d5a3b 0%, #1a3a25 100%);
            color: #ffd700;
            border: 1px solid #c4a747;
            margin: 10px;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-fsb:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #3a7a4f 0%, #2a5a35 100%);
            color: #ffe44d;
        }
        .user-info {
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #c4a747;
        }
        .user-info h4 {
            color: #ffd700;
            margin: 0;
        }
        .user-info p {
            color: #fff;
            margin: 5px 0 0 0;
        }
        h1 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 60px;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <h1>Регистрация сотрудников</h1>
    <form action="/register" method="POST">
        <div>
            <label for="">Логин:</label>
            <input type="text" name="login">
        </div>
        <div>
            <label for="">Пароль:</label>
            <input type="password" name="pass1">
        </div>
        <div>
            <label for="">Подтверждение пароля:</label>
            <input type="password" name="pass2">
        </div>
        <div>
            <input type="submit" name="Регестрация">
        </div>
         
    </form>
    <div class="errors">
        {% for error in errors %}
        <p>{{ error }}</p>
        {% endfor %}
    </div>
</body>
</html>
